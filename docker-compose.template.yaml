# NexHelper Docker Compose Template
# Generated by provision-customer.sh

version: '3.8'

services:
  nexhelper:
    build:
      context: ..
      dockerfile: Dockerfile
    image: nexhelper:${CUSTOMER_SLUG:-latest}
    container_name: nexhelper-${CUSTOMER_SLUG}
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    volumes:
      - ./config:/app/config
      - ./storage:/app/storage
      - ./logs:/app/logs
      - ./exports:/app/exports
    environment:
      # Core
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - PORT=${PORT:-3000}
      - NODE_ENV=production
      
      # Customer
      - CUSTOMER_ID=${CUSTOMER_ID}
      - CUSTOMER_NAME=${CUSTOMER_NAME}
      - CUSTOMER_SLUG=${CUSTOMER_SLUG}
      
      # Consent
      - CONSENT_VERSION=${CONSENT_VERSION:-1.0}
      
      # Integrations (optional)
      - DATEV_BERATER_NR=${DATEV_BERATOR_NR:-}
      - DATEV_MANDANTEN_NR=${DATEV_MANDANTEN_NR:-}
      - SAP_API_URL=${SAP_API_URL:-}
      - SAP_API_KEY=${SAP_API_KEY:-}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - S3_ENDPOINT=${S3_ENDPOINT:-}
      - S3_BUCKET=${S3_BUCKET:-}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-}
    
    labels:
      - "nexhelper.customer=${CUSTOMER_SLUG}"
      - "nexhelper.customerId=${CUSTOMER_ID}"
      - "nexhelper.customerName=${CUSTOMER_NAME}"
      - "nexhelper.botMode=${BOT_MODE:-shared}"
      - "nexhelper.version=2.0"
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT:-3000}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  default:
    name: nexhelper-network
    external: true